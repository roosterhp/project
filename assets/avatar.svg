<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120" role="img" aria-label="Avatar — DevOps engineer">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="100%" stop-color="#bc8cff"/>
    </linearGradient>
    <linearGradient id="gear" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3fb950"/>
      <stop offset="100%" stop-color="#58a6ff"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="60" cy="60" r="58" fill="url(#g)"/>
  <circle cx="60" cy="60" r="54" fill="#0d1117"/>

  <!-- Outer rotating gear ring -->
  <g transform="translate(60 60)" stroke="url(#gear)" stroke-width="2" fill="none">
    <circle r="42" stroke-dasharray="4 6" opacity="0.6">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="18s" repeatCount="indefinite"/>
    </circle>
    <circle r="36" stroke-dasharray="2 4" opacity="0.4">
      <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="22s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Terminal symbol "_>" -->
  <g transform="translate(60 60)" fill="#e6edf3" font-family="JetBrains Mono, monospace" font-weight="700" text-anchor="middle">
    <text y="6" font-size="26" fill="#58a6ff">&gt;_</text>
  </g>

  <!-- Tiny moving "deploy" node -->
  <g>
    <circle cx="60" cy="18" r="4" fill="#3fb950">
      <animateTransform attributeName="transform" type="rotate" from="0 60 60" to="360 60 60" dur="6s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
